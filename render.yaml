# Blueprint opcional — ajuste o nome do serviço ao seu painel Render.
services:
  - type: web
    name: exynax-api-soberana
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
